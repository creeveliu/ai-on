<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4b5563"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a7f3d0"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- 灰色渐变圆形 -->
  <circle cx="16" cy="16" r="14" fill="url(#grad)"/>

  <!-- AI 文字 -->
  <text x="16" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">AI</text>

  <!-- ON 小圆点 - 浅绿渐变 -->
  <circle cx="26" cy="6" r="5" fill="url(#greenGrad)"/>
</svg>